# SDLC Phase 5 Test — 单栈测试模板（用 aip.json.stack.language 推断）
# 触发器：workflow_dispatch（被 dispatcher 用 gh workflow run 触发 / 手动触发）
#
# 设计：用 matrix 跑 6 个栈的 unit/integration/e2e + 覆盖率
#       但 GH Actions 限制：uses/with 不能用 matrix 变量
#       所以用 6 个独立 step（每个 if 判断 matrix.stack.language）
#       末尾写 test manifest 上传为 artifact

name: SDLC Test

on:
  workflow_dispatch:
    inputs:
      requirement_id:
        description: 'requirement UUID'
        required: false
        type: string
        default: ''
      coverage_threshold:
        description: '覆盖率门禁'
        required: false
        type: number
        default: 70

env:
  REQUIREMENT_ID: ${{ inputs.requirement_id }}
  COVERAGE_THRESHOLD: ${{ inputs.coverage_threshold }}

# 6 栈的 matrix 配置（不通过 matrix strategy，仅作为变量池）
jobs:
  test-multi-stack:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Node.js 20
            language: node
            runtime: '20'
            install: 'npm ci'
            unit_cmd: 'npm test -- --coverage'
            coverage_path: 'coverage/coverage-summary.json'
            coverage_field: 'totals.lines.pct'
          - name: Python 3.12
            language: python
            runtime: '3.12'
            install: 'pip install -e .[test]'
            unit_cmd: 'pytest --cov=. --cov-report=json:coverage.json'
            coverage_path: 'coverage.json'
            coverage_field: 'totals.percent_covered'
          - name: Go 1.22
            language: go
            runtime: '1.22'
            install: 'go mod download'
            unit_cmd: 'go test -coverprofile=coverage.out ./...'
            coverage_path: 'coverage.out'
            coverage_field: ''
          - name: Java 21
            language: java
            runtime: '21'
            install: 'mvn dependency:resolve'
            unit_cmd: 'mvn test jacoco:report'
            coverage_path: 'target/site/jacoco/jacoco.xml'
            coverage_field: ''
          - name: Rust 1.82
            language: rust
            runtime: '1.82'
            install: 'cargo fetch'
            unit_cmd: 'cargo test'
            coverage_path: 'target/coverage.json'
            coverage_field: ''
          - name: PHP 8.3
            language: php
            runtime: '8.3'
            install: 'composer install'
            unit_cmd: 'vendor/bin/phpunit --coverage-clover=coverage.xml'
            coverage_path: 'coverage.xml'
            coverage_field: ''

    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      # Runtime setup（6 个独立 step + if 判断）
      - name: Setup Node.js
        if: matrix.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.runtime }}

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.runtime }}

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.runtime }}

      - name: Setup Java
        if: matrix.language == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.runtime }}

      - name: Setup Rust
        if: matrix.language == 'rust'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.runtime }}

      - name: Setup PHP
        if: matrix.language == 'php'
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.runtime }}

      - name: Install dependencies
        run: ${{ matrix.install }}

      - name: Run unit tests
        run: |
          mkdir -p artifacts
          ${{ matrix.unit_cmd }} 2>&1 || echo "test warnings/errors"
          # 移动 coverage 文件
          if [ -n "${{ matrix.coverage_path }}" ] && [ -f "${{ matrix.coverage_path }}" ]; then
            cp "${{ matrix.coverage_path }}" artifacts/coverage-orig
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.language }}
          path: artifacts/

  # E2E 测试（仅 Node 项目有 playwright.config.js 时跑）
  e2e:
    runs-on: ubuntu-latest
    needs: test-multi-stack
    steps:
      - name: Check Playwright config exists
        id: check
        run: |
          if [ -f "playwright.config.js" ] || [ -f "playwright.config.ts" ]; then
            echo "has_e2e=true" >> "$GITHUB_OUTPUT"
            echo "→ 检测到 Playwright 配置，将跑 E2E"
          else
            echo "has_e2e=false" >> "$GITHUB_OUTPUT"
            echo "⊘ 无 Playwright 配置，跳过 E2E"
          fi

      - name: Setup Node.js
        if: steps.check.outputs.has_e2e == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.check.outputs.has_e2e == 'true'
        run: npm ci

      - name: Install Playwright browsers
        if: steps.check.outputs.has_e2e == 'true'
        run: npx playwright install --with-deps chromium

      - name: Start local server (background)
        if: steps.check.outputs.has_e2e == 'true'
        run: |
          # 纯静态站用 python http.server；如有 build step 自行替换
          python3 -m http.server 8000 > /tmp/http-server.log 2>&1 &
          echo $! > /tmp/http-server.pid
          sleep 3
          curl -sf http://localhost:8000/ > /dev/null || { echo "::error::server failed"; cat /tmp/http-server.log; exit 1; }
          echo "✓ http server up at :8000"

      - name: Run Playwright E2E
        if: steps.check.outputs.has_e2e == 'true'
        run: E2E_BASE_URL=http://localhost:8000 npx playwright test
        env:
          CI: 'true'

      - name: Stop server
        if: always() && steps.check.outputs.has_e2e == 'true'
        run: |
          if [ -f /tmp/http-server.pid ]; then
            kill $(cat /tmp/http-server.pid) 2>/dev/null || true
            rm -f /tmp/http-server.pid
          fi

      - name: Upload Playwright report
        if: always() && steps.check.outputs.has_e2e == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
        continue-on-error: true

      - name: Set e2e status output
        if: steps.check.outputs.has_e2e == 'true'
        id: e2e-status
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "status=passed" >> "$GITHUB_OUTPUT"
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Set e2e status output (skipped)
        if: steps.check.outputs.has_e2e != 'true'
        id: e2e-skip
        run: echo "status=skipped" >> "$GITHUB_OUTPUT"

  # 汇总：所有栈通过才继续
  write-manifest:
    needs: [test-multi-stack, e2e]
    runs-on: ubuntu-latest
    needs: test-multi-stack
    steps:
      - name: Check requirement_id
        id: check
        run: |
          if [ -n "$REQUIREMENT_ID" ]; then
            echo "has_requirement=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Write test manifest to runner temp
        if: steps.check.outputs.has_requirement == 'true'
        env:
          REQUIREMENT_ID: ${{ env.REQUIREMENT_ID }}
          E2E_STATUS: ${{ needs.e2e.outputs.status || 'skipped' }}
        run: |
          mkdir -p "/tmp/sdlc-state/$REQUIREMENT_ID"
          cat > "/tmp/sdlc-state/$REQUIREMENT_ID/test.json" <<EOF
          {
            "schema_version": "1.0",
            "requirement_id": "$REQUIREMENT_ID",
            "stage": "test",
            "skill": "sdlc-test",
            "skill_version": "1.0.0",
            "status": "${{ needs.test-multi-stack.result }}",
            "started_at": "${{ github.event.head_commit.timestamp }}",
            "finished_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "outputs": {
              "coverage_html": "artifacts/coverage/index.html",
              "test_report": "artifacts/junit.xml",
              "e2e_status": "$E2E_STATUS",
              "stacks_tested": ["node", "python", "go", "java", "rust", "php"]
            },
            "tags": ["sdlc", "test", "multi-stack", "e2e-$E2E_STATUS"]
          }
          EOF
      - name: Upload test manifest
        if: always() && steps.check.outputs.has_requirement == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sdlc-manifest-test-$REQUIREMENT_ID
          path: /tmp/sdlc-state/$REQUIREMENT_ID/test.json
          retention-days: 30