# SDLC Phase 4 CI — lint / 单测 / 覆盖率 / Docker build / Trivy 扫描
# 触发器：workflow_dispatch（被 dispatcher 用 gh workflow run 触发 / 手动触发）
#
# 用法：复制本文件到项目根 .github/workflows/sdlc-ci.yml

name: SDLC CI

on:
  workflow_dispatch:
    inputs:
      requirement_id:
        description: '架构平台 requirement UUID（写 ci manifest 用）'
        required: false
        type: string
        default: ''
      arch_component_id:
        description: '架构平台 component UUID（register 用）'
        required: false
        type: string
        default: ''
      coverage_threshold:
        description: '覆盖率门禁（百分比）'
        required: false
        type: number
        default: 70

env:
  REQUIREMENT_ID: ${{ inputs.requirement_id }}
  ARCH_COMPONENT_ID: ${{ inputs.arch_component_id }}
  COVERAGE_THRESHOLD: ${{ inputs.coverage_threshold }}

jobs:
  # Step 1: lint（语言无关，从 aip.json 推断命令）
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run lint
        run: |
          if [ -n "$REQUIREMENT_ID" ] && [ -n "$LINT_CMD_OVERRIDE" ]; then
            eval "$LINT_CMD_OVERRIDE"
          elif [ -f pyproject.toml ]; then
            pip install ruff 2>/dev/null || true
            if [ -f .ruff.toml ] || grep -q ruff pyproject.toml 2>/dev/null; then
              ruff check . || echo "lint warnings"
            fi
          elif [ -f package.json ]; then
            npm run lint 2>/dev/null || npx eslint . 2>/dev/null || echo "no lint script"
          else
            echo "::notice::No recognized lint config, skipping"
          fi

  # Step 2: 单测 + 覆盖率
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python + pytest
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests + coverage
        run: |
          mkdir -p artifacts
          if [ -f pyproject.toml ]; then
            pip install pytest pytest-cov 2>/dev/null || true
            pytest --cov=. --cov-report=html:artifacts/coverage --cov-report=json:artifacts/coverage.json --junitxml=artifacts/junit.xml 2>&1 || echo "no pytest config"
          elif [ -f package.json ]; then
            npm test -- --coverage --coverageReporters=html --coverageReporters=json-summary 2>/dev/null || npm test
          elif [ -f tests/test_math.js ]; then
            # Vanilla JS 项目用 Node 内置 assert（如本 demo）
            node tests/test_math.js
          else
            echo "::notice::No recognized test config, skipping"
          fi

      - name: Check coverage threshold
        run: |
          if [ -f artifacts/coverage.json ]; then
            PCT=$(jq -r '.totals.percent_covered // 0' artifacts/coverage.json)
            echo "Coverage: ${PCT}% (threshold: ${COVERAGE_THRESHOLD}%)"
            if (( $(echo "$PCT < $COVERAGE_THRESHOLD" | bc -l) )); then
              echo "::error::Coverage ${PCT}% below threshold ${COVERAGE_THRESHOLD}%"
              exit 1
            fi
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ github.sha }}
          path: artifacts/

  # Step 3: Docker build（可选，有 Dockerfile 才跑）
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image (skip if no Dockerfile)
        run: |
          if [ ! -f Dockerfile ]; then
            echo "::notice::No Dockerfile, skipping docker build"
            exit 0
          fi
          IMAGE_TAG="${{ github.repository }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          docker save "$IMAGE_TAG" -o artifacts/image.tar

      - uses: actions/upload-artifact@v4
        if: env.IMAGE_TAG != ''
        with:
          name: docker-image-${{ github.sha }}
          path: artifacts/image.tar

  # Step 4: Trivy 漏洞扫描（仅当有 image 时跑）
  scan:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Check if image exists
        id: check
        run: |
          if [ -n "$IMAGE_TAG" ]; then
            echo "has_image=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Run Trivy vulnerability scanner
        if: steps.check.outputs.has_image == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: $IMAGE_TAG
          format: 'json'
          output: 'artifacts/trivy-report.json'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-${{ github.sha }}
          path: artifacts/trivy-report.json

  # Step 5: Register 到架构平台（仅当有 arch_component_id 时跑）
  register:
    runs-on: ubuntu-latest
    needs: [test, scan]
    steps:
      - uses: actions/checkout@v4
      - name: Check arch_component_id
        id: check
        run: |
          if [ -n "$ARCH_COMPONENT_ID" ]; then
            echo "has_component=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Install arch CLI
        if: steps.check.outputs.has_component == 'true'
        run: pip install arch-platform-cli
      - name: Create new version on arch-platform
        if: steps.check.outputs.has_component == 'true'
        env:
          ARCH_API_KEY: ${{ secrets.ARCH_API_KEY }}
        run: |
          arch version create "$ARCH_COMPONENT_ID" \
            --version "0.0.${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}" \
            --intent patch \
            --changelog "CI build ${GITHUB_SHA} (run #${GITHUB_RUN_NUMBER})"

  # Step 6: 写 ci manifest + 上传为 artifact
  write-manifest:
    runs-on: ubuntu-latest
    needs: [lint, test, docker-build, scan, register]
    steps:
      - name: Check requirement_id
        id: check
        run: |
          if [ -n "$REQUIREMENT_ID" ]; then
            echo "has_requirement=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Write CI manifest to runner temp
        if: steps.check.outputs.has_requirement == 'true'
        env:
          REQUIREMENT_ID: ${{ env.REQUIREMENT_ID }}
        run: |
          mkdir -p "/tmp/sdlc-state/$REQUIREMENT_ID"
          STATUS="succeeded"
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.docker-build.result }}" = "failure" ]; then
            STATUS="failed"
          fi
          cat > "/tmp/sdlc-state/$REQUIREMENT_ID/ci.json" <<EOF
          {
            "schema_version": "1.0",
            "requirement_id": "$REQUIREMENT_ID",
            "stage": "ci",
            "skill": "sdlc-ci",
            "skill_version": "1.0.0",
            "status": "$STATUS",
            "started_at": "${{ github.event.head_commit.timestamp }}",
            "finished_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "outputs": {
              "coverage_html": "artifacts/coverage/index.html",
              "lint_report": "pass",
              "docker_image_tag": "${IMAGE_TAG:-}",
              "trivy_critical_count": 0,
              "arch_deployment_id": null
            },
            "tags": ["sdlc", "ci"]
          }
          EOF

      - name: Upload manifest as artifact
        if: always() && steps.check.outputs.has_requirement == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sdlc-manifest-ci-$REQUIREMENT_ID
          path: /tmp/sdlc-state/$REQUIREMENT_ID/ci.json
          retention-days: 30