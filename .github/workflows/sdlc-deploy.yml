# SDLC Phase 6 Deploy — sdic-demo-mathviz 静态站点 rsync 到 #1
# 触发器：workflow_dispatch（被 dispatcher 用 gh workflow run 触发 / 手动触发）
#
# 设计：
#   - 静态站点 → rsync 到 /var/www/mathviz
#   - 不需要 systemd（nginx 直接 serve 静态文件）
#   - 健康检查用 SERVICE_URL=https://mathviz.intelab.cn
#   - 写 deploy.json 喂 sdlc-feedback-watchdog

name: SDLC Deploy (mathviz)

on:
  workflow_dispatch:
    inputs:
      requirement_id:
        description: 'requirement UUID（b9a407b1...）'
        required: false
        default: ''
      service_name:
        description: '服务名（用于 manifest 标识）'
        required: true
        default: 'mathviz'
      deploy_target:
        description: '部署目标（host[:port] 形式）'
        required: true
        default: 'root@124.71.219.208'
      service_url:
        description: '健康检查 URL'
        required: true
        default: 'https://mathviz.intelab.cn'

env:
  REQUIREMENT_ID: ${{ inputs.requirement_id }}
  SERVICE_NAME: ${{ inputs.service_name }}
  DEPLOY_TARGET: ${{ inputs.deploy_target }}
  SERVICE_URL: ${{ inputs.service_url }}

jobs:
  # Step 1: Checkout + 准备文件
  prepare:
    runs-on: ubuntu-latest
    outputs:
      has_files: ${{ steps.check.outputs.has_files }}
    steps:
      - uses: actions/checkout@v4
      - name: Check deployable files
        id: check
        run: |
          if [ -f "index.html" ] || [ -f "index.htm" ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
            echo "→ 找到 index.html/index.htm"
          else
            echo "::error::未找到 index.html 或 index.htm"
            exit 1
          fi

  # Step 2: rsync 到 #1
  deploy:
    runs-on: ubuntu-latest
    needs: prepare
    environment: production  # 引用 GH Environment 配置 SSH_PRIVATE_KEY
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: rsync 静态文件到 /var/www/mathviz
        run: |
          set -euo pipefail
          # 先 dry-run 统计文件数
          FILE_COUNT=$(find . -type f \
            -not -path './.git/*' \
            -not -path './.github/*' \
            -not -path './tests/*' \
            -not -path './node_modules/*' \
            | wc -l)
          echo "→ 将部署 $FILE_COUNT 个文件到 $DEPLOY_TARGET:/var/www/mathviz/"

          # rsync（--delete 保持目录干净，--exclude 排除 .git/.github/tests）
          rsync -avz --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='tests/' \
            --exclude='node_modules/' \
            --exclude='.gitignore' \
            --exclude='*.md' \
            -e "ssh -o StrictHostKeyChecking=accept-new" \
            ./ "$DEPLOY_TARGET:/var/www/mathviz/"

          echo "✓ Deploy succeeded on $DEPLOY_TARGET"

  # Step 3: 健康检查
  healthcheck:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: HTTP 健康检查
        run: |
          set -euo pipefail
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 -L "$SERVICE_URL" || echo "000")
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Health check failed: HTTP $HTTP_CODE at $SERVICE_URL"
            exit 1
          fi
          echo "✓ Health check passed: HTTP $HTTP_CODE at $SERVICE_URL"

  # Step 4: 写 deploy manifest 上传为 artifact（喂 watchdog）
  write-manifest:
    runs-on: ubuntu-latest
    needs: [deploy, healthcheck]
    steps:
      - name: Check requirement_id
        id: check
        run: |
          if [ -n "$REQUIREMENT_ID" ]; then
            echo "has_requirement=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Write deploy manifest
        if: always() && steps.check.outputs.has_requirement == 'true'
        run: |
          mkdir -p "/tmp/sdlc-state/$REQUIREMENT_ID"
          STATUS="succeeded"
          cat > "/tmp/sdlc-state/$REQUIREMENT_ID/deploy.json" <<EOF
          {
            "schema_version": "1.0",
            "requirement_id": "$REQUIREMENT_ID",
            "stage": "deploy",
            "skill": "sdlc-deploy",
            "skill_version": "1.1.0",
            "status": "$STATUS",
            "started_at": "${{ github.event.head_commit.timestamp }}",
            "finished_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "outputs": {
              "arch_deployment_id": null,
              "service_url": "$SERVICE_URL",
              "deployment_log": "deploy.log"
            },
            "tags": ["sdlc", "deploy", "static-site"]
          }
          EOF
          echo "✓ manifest: /tmp/sdlc-state/$REQUIREMENT_ID/deploy.json"
      - name: Upload deploy manifest
        if: always() && steps.check.outputs.has_requirement == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sdlc-manifest-deploy-$REQUIREMENT_ID
          path: /tmp/sdlc-state/$REQUIREMENT_ID/deploy.json
          retention-days: 30
