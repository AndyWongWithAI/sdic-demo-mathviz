# SDLC Dispatcher — 读 sdlc-registry.json 决定跑哪些 workflow
# 用法：复制本文件 + sdlc-registry.json + sdlc-ci.yml/test.yml/deploy.yml 到项目根 .github/workflows/
#
# 替换某阶段 workflow：
#   1. 提交新 yaml 到 .github/workflows/（如 sdlc-ci-v2.yml）
#   2. 改 sdlc-registry.json 1 行："ci": "sdlc-ci.yml" → "ci": "sdlc-ci-v2.yml"
#   3. commit & push → dispatcher 自动用 gh CLI 触发新 yaml

name: SDLC Dispatcher

# 显式授予 GITHUB_TOKEN 触发 workflow_dispatch 的权限
permissions:
  contents: read
  actions: write

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read sdlc-registry.json
        id: read
        run: |
          if [ -f .github/workflows/sdlc-registry.json ]; then
            REG=$(cat .github/workflows/sdlc-registry.json)
            echo "ci=$(echo "$REG" | jq -r '.ci // ""')" >> "$GITHUB_OUTPUT"
            echo "test=$(echo "$REG" | jq -r '.test // ""')" >> "$GITHUB_OUTPUT"
            echo "deploy=$(echo "$REG" | jq -r '.deploy // ""')" >> "$GITHUB_OUTPUT"
            echo "✓ Registry resolved"
          else
            echo "::error::sdlc-registry.json not found"
            exit 1
          fi

      - name: Trigger CI workflow
        if: steps.read.outputs.ci != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "→ Triggering ${{ steps.read.outputs.ci }}"
          gh workflow run "${{ steps.read.outputs.ci }}" --ref "${{ github.ref }}"

      - name: Trigger test workflow
        if: steps.read.outputs.test != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "→ Triggering ${{ steps.read.outputs.test }}"
          gh workflow run "${{ steps.read.outputs.test }}" --ref "${{ github.ref }}"

      - name: Trigger deploy workflow
        if: steps.read.outputs.deploy != '' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "→ Triggering ${{ steps.read.outputs.deploy }}"
          gh workflow run "${{ steps.read.outputs.deploy }}" --ref "${{ github.ref }}" \
            -f service_name="sdic-demo-mathviz" \
            -f deploy_target="gh-pages"

  # 横切：校验 registry 完整性（始终跑）
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate registry schema
        run: |
          [ -f .github/workflows/sdlc-registry.json ] || { echo "::error::missing"; exit 1; }
          REG=$(cat .github/workflows/sdlc-registry.json)
          echo "$REG" | jq -e '.ci' > /dev/null || { echo "::error::.ci missing"; exit 1; }
              echo "$REG" | jq -e '.test' > /dev/null || { echo "::error::.test missing"; exit 1; }
              echo "$REG" | jq -e '.deploy' > /dev/null || { echo "::error::.deploy missing"; exit 1; }
              echo "✓ SDLC registry valid"