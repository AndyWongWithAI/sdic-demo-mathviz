<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>MathViz - 数学函数可视化</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>MathViz</h1>
    <p>数学函数可视化（SDLC 跨项目验证 demo · 目标需求 arch://b9a407b1）</p>
  </header>
  <main>
    <div class="controls">
      <label>函数 f(x): <input type="text" id="func" value="Math.sin(x)" size="20"></label>
      <label>x_min: <input type="number" id="xmin" value="-10" step="0.5"></label>
      <label>x_max: <input type="number" id="xmax" value="10" step="0.5"></label>
      <button onclick="draw()">绘制</button>
    </div>
    <canvas id="canvas" width="800" height="500"></canvas>
    <div id="error" class="error"></div>
  </main>
  <script src="math.js"></script>
  <script src="app.js"></script>
</body>
</html>
